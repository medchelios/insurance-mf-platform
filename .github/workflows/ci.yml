name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build all apps
        run: pnpm build
      
      - name: Start MFE servers in background
        run: |
          pnpm preview:mfe1 &
          pnpm preview:mfe2 &
          pnpm preview:host &
          sleep 10
      
      - name: Test servers are running
        run: |
          curl -f http://localhost:3000/ || exit 1
          curl -f http://localhost:3001/assets/remoteEntry.js || exit 1
          curl -f http://localhost:3002/assets/remoteEntry.js || exit 1
      
      - name: Stop servers
        run: pkill -f "vite"