name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install host dependencies
        run: cd apps-mf/host && pnpm install
      
      - name: Build host
        run: cd apps-mf/host && pnpm build
      
      - name: Start host server
        run: cd apps-mf/host && pnpm preview &
        shell: bash
        
      - name: Wait for server
        run: sleep 5
      
      - name: Test server
        run: curl -f http://localhost:3000/
      
      - name: Stop server
        run: pkill -f "vite" || true

  build-bff:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          
      - name: Install Composer dependencies
        run: cd bff-mf && composer install --no-interaction
      
      - name: Setup MySQL
        uses: shivammathur/setup-mysql@v2
        with:
          mysql-version: '8.0'
          database: insurance_mf
          user: root
          password: password
      
      - name: Run migrations
        run: cd bff-mf && php artisan migrate --force
      
      - name: Seed database
        run: cd bff-mf && php artisan db:seed --class=DatabaseSeeder
      
      - name: Start API server
        run: cd bff-mf && php artisan serve --port=8000 &
        shell: bash
        
      - name: Wait for server
        run: sleep 5
      
      - name: Test API login
        run: |
          curl -X POST http://localhost:8000/api/login \
            -H "Content-Type: application/json" \
            -d '{"email":"test@example.com","password":"password123"}'
      
      - name: Stop server
        run: pkill -f "artisan" || true