name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: apps-mf/host/pnpm-lock.yaml
      
      - name: Install host dependencies
        run: cd apps-mf/host && pnpm install
      
      - name: Build host
        run: cd apps-mf/host && pnpm build
      
      - name: Start host server
        run: cd apps-mf/host && pnpm preview &
        shell: bash
        
      - name: Wait for server
        run: sleep 5
      
      - name: Test server
        run: curl -f http://localhost:3000/ || exit 1
      
      - name: Stop server
        run: pkill -f "vite"